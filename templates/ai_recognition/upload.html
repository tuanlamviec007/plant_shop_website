{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="fas fa-camera"></i> Nhận diện cây qua ảnh (AI)</h4>
            </div>
            <div class="card-body text-center">
                <p class="lead">Tải lên hình ảnh cây cảnh, AI của chúng tôi sẽ phân tích và cho bạn biết đó là cây gì!</p>
                
                <form method="post" action="{% url 'recognize_plant' %}" enctype="multipart/form-data" class="mt-4">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="imageUpload" class="form-label h5">Chọn ảnh từ thiết bị</label>
                        <input class="form-control form-control-lg" type="file" id="imageUpload" name="image" accept="image/*" required>
                    </div>
                    
                    <div class="d-grid gap-2 col-6 mx-auto">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-search"></i> Phân tích ngay
                        </button>
                    </div>
                </form>
                
                <hr class="my-4">
                <div class="alert alert-info">
                    <i class="fas fa-info-circle"></i> Kết quả nhận diện chỉ mang tính chất tham khảo.
                </div>
            </div>
            <div class="card-footer text-center">
                <a href="{% url 'recognition_history' %}" class="btn btn-outline-secondary">Xem lịch sử nhận diện</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
