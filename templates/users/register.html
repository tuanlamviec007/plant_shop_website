{% extends 'base.html' %}

{% block title %}Đăng ký - Plant Shop{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5 mb-5">
        <div class="col-md-6">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-plus fa-3x text-success mb-3"></i>
                        <h3 class="fw-bold">Đăng Ký Tài Khoản</h3>
                        <p class="text-muted">Tạo tài khoản để mua sắm</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Họ *</label>
                                <input type="text" class="form-control" name="last_name" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Tên *</label>
                                <input type="text" class="form-control" name="first_name" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tên đăng nhập *</label>
                            <input type="text" class="form-control" name="username" required minlength="4">
                            <small class="text-muted">Ít nhất 4 ký tự</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email *</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input type="tel" class="form-control" name="phone" pattern="[0-9]{10,11}">
                            <small class="text-muted">10-11 số</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Địa chỉ</label>
                            <textarea class="form-control" name="address" rows="2"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mật khẩu *</label>
                            <input type="password" class="form-control" name="password" required minlength="8"
                                id="password">
                            <small class="text-muted">Ít nhất 8 ký tự</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nhập lại mật khẩu *</label>
                            <input type="password" class="form-control" name="password2" required minlength="8"
                                id="password2">
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2">
                            <i class="fas fa-user-check"></i> Đăng ký
                        </button>
                    </form>

                    <hr class="my-4">

                    <p class="text-center text-muted mb-0">
                        Đã có tài khoản? <a href="{% url 'login' %}">Đăng nhập ngay</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Kiểm tra mật khẩu khớp
    document.querySelector('form').addEventListener('submit', function (e) {
        const password = document.getElementById('password').value;
        const password2 = document.getElementById('password2').value;

        if (password !== password2) {
            e.preventDefault();
            alert('Mật khẩu không khớp!');
        }
    });
</script>
{% endblock %}
